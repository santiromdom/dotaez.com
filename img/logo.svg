<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo rojo exterior (marco) -->
  <rect x="0" y="0" width="500" height="500" fill="#8B3A2F" rx="0"/>
  
  <!-- Marco negro interior -->
  <rect x="50" y="50" width="400" height="400" fill="#000000" rx="0"/>
  
  <!-- Letra D blanca -->
  <g>
    <!-- D shape -->
    <path d="M 80 100 L 200 100 Q 240 100 240 170 L 240 330 Q 240 400 200 400 L 80 400 Z" 
          fill="#FFFFFF" stroke="none"/>
  </g>
  
  <!-- Letras EZ en verde lima -->
  <g font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#CCFF00">
    <text x="80" y="280" text-anchor="start">EZ</text>
  </g>
  
  <!-- Línea diagonal roja gruesa -->
  <line x1="280" y1="80" x2="420" y2="220" stroke="#C41E3A" stroke-width="50" stroke-linecap="round"/>
  
  <!-- Círculo rojo en esquina superior derecha -->
  <circle cx="420" cy="80" r="50" fill="#C41E3A"/>
  
  <!-- Círculo rojo en esquina inferior izquierda -->
  <circle cx="80" cy="420" r="50" fill="#C41E3A"/>
</svg>
